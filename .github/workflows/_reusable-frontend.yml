name: '[Reusable] Frontend deploy'

# Reusable workflow for building and deploying the React frontend.
# Called by the per-environment deploy-frontend wrapper workflows.

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub environment name.
        required: true
        type: string
      s3-bucket:
        description: S3 bucket name for frontend assets.
        required: true
        type: string
      cloudfront-distribution-id:
        description: CloudFront distribution ID.
        required: true
        type: string
      aws-region:
        description: AWS region.
        required: false
        type: string
        default: ap-southeast-2
    secrets:
      frontend-role-arn:
        description: ARN of the frontend deployer IAM role.
        required: true
      # Vite environment variables — store these as GitHub environment secrets
      # or variables.  Secrets are prefixed with VITE_ and are not sensitive
      # (they are embedded in the built JS bundle), but storing them in GitHub
      # keeps them out of version control.
      vite-api-url:
        description: VITE_API_URL value.
        required: true
      vite-cognito-user-pool-id:
        description: VITE_COGNITO_USER_POOL_ID value.
        required: true
      vite-cognito-client-id:
        description: VITE_COGNITO_CLIENT_ID value.
        required: true
      vite-cognito-hosted-ui-domain:
        description: VITE_COGNITO_HOSTED_UI_DOMAIN value.
        required: true
      vite-cognito-redirect-uri:
        description: VITE_COGNITO_REDIRECT_URI value (CloudFront URL).
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy-frontend:
    name: Deploy frontend (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup AWS credentials
        uses: ./.github/actions/setup-aws
        with:
          role-arn: ${{ secrets.frontend-role-arn }}
          aws-region: ${{ inputs.aws-region }}
          session-name: frontend-deploy-${{ inputs.environment }}

      - name: Build and deploy frontend
        uses: ./.github/actions/build-frontend
        with:
          s3-bucket: ${{ inputs.s3-bucket }}
          cloudfront-distribution-id: ${{ inputs.cloudfront-distribution-id }}
          env-vars: |
            VITE_API_URL=${{ secrets.vite-api-url }}
            VITE_COGNITO_REGION=${{ inputs.aws-region }}
            VITE_COGNITO_USER_POOL_ID=${{ secrets.vite-cognito-user-pool-id }}
            VITE_COGNITO_CLIENT_ID=${{ secrets.vite-cognito-client-id }}
            VITE_COGNITO_HOSTED_UI_DOMAIN=${{ secrets.vite-cognito-hosted-ui-domain }}
            VITE_COGNITO_REDIRECT_URI=${{ secrets.vite-cognito-redirect-uri }}
