name: Deploy frontend

# Builds the React app and deploys to S3 + CloudFront.
#
# Trigger:
#   - Push to main when frontend code changes → auto-deploy to dev
#   - Manual dispatch → choose environment
#
# Required GitHub environment secrets (per environment):
#   FRONTEND_ROLE_ARN             — ARN of the frontend deployer IAM role
#   VITE_API_URL                  — API Gateway invoke URL
#   VITE_COGNITO_USER_POOL_ID
#   VITE_COGNITO_CLIENT_ID
#   VITE_COGNITO_HOSTED_UI_DOMAIN
#   VITE_COGNITO_REDIRECT_URI     — CloudFront URL for this environment
#
# Required GitHub environment variables (per environment):
#   S3_BUCKET_NAME                — Frontend S3 bucket name
#   CLOUDFRONT_DISTRIBUTION_ID    — CloudFront distribution ID
#
# Retrieve all values from: terraform -chdir=infra/environments/{env} output
# See docs/github-oidc-setup.md for setup instructions.

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

jobs:
  deploy-dev:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    name: Deploy frontend to dev
    uses: ./.github/workflows/_reusable-frontend.yml
    with:
      environment: dev
      s3-bucket: ${{ vars.S3_BUCKET_NAME_DEV }}
      cloudfront-distribution-id: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID_DEV }}
    secrets:
      frontend-role-arn: ${{ secrets.FRONTEND_ROLE_ARN_DEV }}
      vite-api-url: ${{ secrets.VITE_API_URL_DEV }}
      vite-cognito-user-pool-id: ${{ secrets.VITE_COGNITO_USER_POOL_ID_DEV }}
      vite-cognito-client-id: ${{ secrets.VITE_COGNITO_CLIENT_ID_DEV }}
      vite-cognito-hosted-ui-domain: ${{ secrets.VITE_COGNITO_HOSTED_UI_DOMAIN_DEV }}
      vite-cognito-redirect-uri: ${{ secrets.VITE_COGNITO_REDIRECT_URI_DEV }}

  deploy-prod:
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'prod'
    name: Deploy frontend to prod
    uses: ./.github/workflows/_reusable-frontend.yml
    with:
      environment: prod
      s3-bucket: ${{ vars.S3_BUCKET_NAME_PROD }}
      cloudfront-distribution-id: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID_PROD }}
    secrets:
      frontend-role-arn: ${{ secrets.FRONTEND_ROLE_ARN_PROD }}
      vite-api-url: ${{ secrets.VITE_API_URL_PROD }}
      vite-cognito-user-pool-id: ${{ secrets.VITE_COGNITO_USER_POOL_ID_PROD }}
      vite-cognito-client-id: ${{ secrets.VITE_COGNITO_CLIENT_ID_PROD }}
      vite-cognito-hosted-ui-domain: ${{ secrets.VITE_COGNITO_HOSTED_UI_DOMAIN_PROD }}
      vite-cognito-redirect-uri: ${{ secrets.VITE_COGNITO_REDIRECT_URI_PROD }}
