name: '[Reusable] Terraform plan/apply'

# Reusable workflow for Terraform deployments.
# Called by the per-environment deploy-infra wrapper workflows.
# This file can be extracted to an organisation-level template repository and
# referenced with `uses: org/template-repo/.github/workflows/_reusable-terraform.yml@main`.

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub environment name (must match the Terraform environment directory).
        required: true
        type: string
      tf-directory:
        description: Path to the Terraform environment directory.
        required: true
        type: string
      apply:
        description: Whether to run terraform apply (true/false).
        required: false
        type: boolean
        default: false
      aws-region:
        description: AWS region.
        required: false
        type: string
        default: ap-southeast-2
    secrets:
      infra-role-arn:
        description: ARN of the infra deployer IAM role to assume via OIDC.
        required: true

permissions:
  id-token: write   # Required for OIDC
  contents: read

jobs:
  terraform:
    name: Terraform ${{ inputs.apply && 'apply' || 'plan' }} (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup AWS credentials
        uses: ./.github/actions/setup-aws
        with:
          role-arn: ${{ secrets.infra-role-arn }}
          aws-region: ${{ inputs.aws-region }}
          session-name: terraform-${{ inputs.environment }}

      - name: Terraform plan/apply
        uses: ./.github/actions/terraform-plan-apply
        with:
          working-directory: ${{ inputs.tf-directory }}
          apply: ${{ inputs.apply && 'true' || 'false' }}
