name: '[Reusable] Lambda deploy'

# Reusable workflow for building and deploying the Lambda function.
# Called by the per-environment deploy-backend wrapper workflows.

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub environment name.
        required: true
        type: string
      function-name:
        description: Lambda function name.
        required: true
        type: string
      aws-region:
        description: AWS region.
        required: false
        type: string
        default: ap-southeast-2
    secrets:
      backend-role-arn:
        description: ARN of the backend deployer IAM role.
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy-lambda:
    name: Deploy Lambda (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and package Lambda
        uses: ./.github/actions/build-backend

      - name: Setup AWS credentials
        uses: ./.github/actions/setup-aws
        with:
          role-arn: ${{ secrets.backend-role-arn }}
          aws-region: ${{ inputs.aws-region }}
          session-name: lambda-deploy-${{ inputs.environment }}

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name ${{ inputs.function-name }} \
            --zip-file fileb://backend/function.zip \
            --region ${{ inputs.aws-region }}
