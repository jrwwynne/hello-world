name: Terraform plan and apply
description: >
  Runs terraform init, plan, and optionally apply for a given environment
  directory.  Assumes AWS credentials have already been configured.

inputs:
  working-directory:
    description: Path to the Terraform environment directory.
    required: true
  apply:
    description: Set to 'true' to run terraform apply after plan.
    required: false
    default: 'false'
  terraform-version:
    description: Terraform version to install.
    required: false
    default: '1.7.0'

runs:
  using: composite
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform-version }}

    - name: Terraform init
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terraform init -input=false

    - name: Terraform validate
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terraform validate

    - name: Terraform plan
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terraform plan -input=false -out=tfplan

    - name: Terraform apply
      if: inputs.apply == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terraform apply -input=false tfplan
