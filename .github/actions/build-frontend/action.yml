name: Build and deploy frontend
description: >
  Installs frontend dependencies, runs the Vite build, syncs assets to S3,
  and creates a CloudFront cache invalidation.  Assumes AWS credentials have
  already been configured.

inputs:
  node-version:
    description: Node.js version.
    required: false
    default: '20'
  working-directory:
    description: Path to the frontend directory.
    required: false
    default: frontend
  s3-bucket:
    description: Name of the S3 bucket to deploy assets to.
    required: true
  cloudfront-distribution-id:
    description: CloudFront distribution ID for cache invalidation.
    required: true
  env-vars:
    description: >
      Newline-separated VITE_* environment variable assignments to inject
      before the build.  Example: "VITE_API_URL=https://..."
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm ci

    - name: Write environment file
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        ENV_VARS: ${{ inputs.env-vars }}
      run: |
        # Write each line from the env-vars input into .env
        echo "$ENV_VARS" > .env

    - name: Build
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm run build

    - name: Sync to S3
      shell: bash
      run: |
        aws s3 sync ${{ inputs.working-directory }}/dist/ s3://${{ inputs.s3-bucket }}/ \
          --delete \
          --cache-control "public,max-age=31536000,immutable" \
          --exclude "index.html"

        # index.html must not be cached by browsers so SPA updates propagate immediately.
        aws s3 cp ${{ inputs.working-directory }}/dist/index.html s3://${{ inputs.s3-bucket }}/index.html \
          --cache-control "no-cache,no-store,must-revalidate"

    - name: Invalidate CloudFront cache
      shell: bash
      run: |
        aws cloudfront create-invalidation \
          --distribution-id ${{ inputs.cloudfront-distribution-id }} \
          --paths "/*"
